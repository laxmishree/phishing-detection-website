<div class="container">

<h1>Feedback Form</h1>

<form action="/save_feedback" method="POST">

<input
type="text"
name="name"
placeholder="Enter Name"
required>

<br><br>

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<br><br>

<textarea
name="message"
placeholder="Enter Feedback"
rows="5"
cols="40"
required>
</textarea>

<br><br>

<button type="submit">
Submit Feedback
</button>

</form>
